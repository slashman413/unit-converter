<script>
  const $=id=>document.getElementById(id);
  // factor to base unit
  const CATS={
    length:{name:["長度","Length"],units:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254}},
    weight:{name:["重量","Weight"],units:{kg:1,g:0.001,mg:1e-6,t:1000,lb:0.453592,oz:0.0283495}},
    area:{name:["面積","Area"],units:{"m²":1,"km²":1e6,"cm²":1e-4,ha:1e4,"ft²":0.092903,"坪":3.30579}},
    speed:{name:["速度","Speed"],units:{"m/s":1,"km/h":0.277778,mph:0.44704,knot:0.514444}},
    data:{name:["資料","Data"],units:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776}},
    temp:{name:["溫度","Temp"],units:{"°C":1,"°F":1,K:1}}
  };
  let cat='length';
  $("cats").innerHTML=Object.keys(CATS).map(k=>`<button class="cat ${k==='length'?'on':''}" data-k="${k}"></button>`).join("");
  function fillUnits(){
    const u=Object.keys(CATS[cat].units);
    $("ua").innerHTML=u.map(x=>`<option>${x}</option>`).join("");
    $("ub").innerHTML=u.map(x=>`<option>${x}</option>`).join("");
    if(u.length>1)$("ub").selectedIndex=1;
  }
  function toBase(v,u){ if(cat==='temp'){ if(u==='°C')return v; if(u==='°F')return (v-32)*5/9; if(u==='K')return v-273.15; } return v*CATS[cat].units[u]; }
  function fromBase(v,u){ if(cat==='temp'){ if(u==='°C')return v; if(u==='°F')return v*9/5+32; if(u==='K')return v+273.15; } return v/CATS[cat].units[u]; }
  function conv(src){
    const ua=$("ua").value, ub=$("ub").value;
    if(src==='a'){ const base=toBase(+$("a").value||0,ua); $("b").value=+fromBase(base,ub).toPrecision(8); }
    else { const base=toBase(+$("b").value||0,ub); $("a").value=+fromBase(base,ua).toPrecision(8); }
  }
  window.conv=conv;
  document.querySelectorAll('.cat').forEach(b=>b.addEventListener('click',()=>{ cat=b.dataset.k; document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on')); b.classList.add('on'); fillUnits(); conv('a'); }));
  const I18N={title:["單位換算器","Unit Converter"],sub:["長度、重量、溫度、面積、速度、資料大小即時換算。本機運算。","Convert length, weight, temperature, area, speed & data size instantly. Runs locally."],q1:["支援哪些單位？ / Which units?","Which units are supported?"],a1:["長度、重量、溫度、面積、速度、資料大小等常用單位。Length, weight, temperature, area, speed and data size.","Length, weight, temperature, area, speed and data size."],q2:["免費嗎？ / Free?","Is it free?"],a2:["完全免費，本機運算不上傳。Completely free, runs locally.","Completely free, runs locally."],home:["← 回 AI工具人首頁","← Back to AI Toolkit home"],terms:["服務說明","Terms"],privacy:["隱私權政策","Privacy"]};
  let LANG=localStorage.getItem('site_lang')||'zh';
  function setLang(l){LANG=l;const i=l==='en'?1:0;document.querySelectorAll('.cat').forEach(b=>{const c=CATS[b.dataset.k];if(c)b.textContent=c.name[i]});document.querySelectorAll('[data-i18n]').forEach(el=>{const t=I18N[el.getAttribute('data-i18n')];if(t)el.textContent=t[i]});document.documentElement.lang=l==='en'?'en':'zh-TW';$("langBtn").textContent=l==='en'?'中':'EN';localStorage.setItem('site_lang',l);}
  function toggleLang(){setLang(LANG==='en'?'zh':'en')}window.toggleLang=toggleLang;
  fillUnits(); setLang(LANG); conv('a');
  document.addEventListener('click',function(ev){var a=ev.target.closest&&ev.target.closest('a');if(!a||!a.href||typeof gtag!=='function')return;if(a.href.indexOf('slashman413.github.io')>-1)gtag('event','internal_click',{link_url:a.href});});
  try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
</script>
